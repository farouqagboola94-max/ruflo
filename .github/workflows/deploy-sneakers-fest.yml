name: Deploy Sneakers Fest to Netlify

on:
  push:
    branches:
      - claude/sneakers-fest-app-hiZxs
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sneakers-fest/package-lock.json

      - name: Install dependencies
        working-directory: sneakers-fest
        run: npm ci

      - name: Build
        working-directory: sneakers-fest
        run: npm run build

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=sneakers-fest/out --prod
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
