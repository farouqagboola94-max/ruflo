# Za.allyErrands — Netlify Deployment Config

[build]
  publish = "allyerrands"

[[redirects]]
  from = "/portal"
  to   = "/portal/index.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

# Block direct access to backend source files in production
[[headers]]
  for = "/backend/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy  = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://hook.*.make.com https://graph.facebook.com;"
